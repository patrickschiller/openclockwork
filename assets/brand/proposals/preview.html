<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClockwork logo proposals</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: #111827;
        background: #eef2f7;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      .page {
        max-width: 1040px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        line-height: 1.2;
      }

      .proposal {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        gap: 20px;
        align-items: center;
        margin: 0 0 24px;
        padding: 20px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .favicon {
        width: 64px;
        height: 64px;
        justify-self: center;
        image-rendering: auto;
      }

      @media (max-width: 720px) {
        body {
          padding: 20px;
        }

        .proposal {
          grid-template-columns: 1fr;
        }

        .favicon {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>OpenClockwork logo proposals</h1>
      <div class="proposal">
        <div>
          <h2>1. Classic match clock</h2>
          <img
            src="./proposal-1-classic-logo.svg"
            alt="Classic match clock logo"
          />
        </div>
        <img
          class="favicon"
          src="./proposal-1-classic-favicon.svg"
          alt="Classic match clock favicon"
        />
      </div>
      <div class="proposal">
        <div>
          <h2>2. Split time</h2>
          <img src="./proposal-2-split-time-logo.svg" alt="Split time logo" />
        </div>
        <img
          class="favicon"
          src="./proposal-2-split-time-favicon.svg"
          alt="Split time favicon"
        />
      </div>
      <div class="proposal">
        <div>
          <h2>3. Digital board clock</h2>
          <img
            src="./proposal-3-digital-board-logo.svg"
            alt="Digital board clock logo"
          />
        </div>
        <img
          class="favicon"
          src="./proposal-3-digital-board-favicon.svg"
          alt="Digital board clock favicon"
        />
      </div>
    </div>
  </body>
</html>
